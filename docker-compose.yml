version: "3.9"

services:
  db:
    image: postgres:15
    container_name: bq_postgres
    restart: always
    environment:
      POSTGRES_USER: bquser
      POSTGRES_PASSWORD: bqpassword
      POSTGRES_DB: bano_qabil
    ports:
      - "5432:5432"
    volumes:
      - bq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bquser -d bano_qabil"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bq_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bquser:bqpassword@db:5432/bano_qabil
      SECRET_KEY: change-this-in-production-to-a-long-random-string
      STORAGE_PATH: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - bq_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bq_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  bq_pgdata:
  bq_storage:
